<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>命運大岩蛇之天堂與地獄</title>
	<link rel="shortcut icon" href="../game.ico"/>
	<link rel="bookmark" href="../game.ico"/>
	<style type="text/css">
		.contain{
			background-image: url(pokemon_bg.png);
			background-size: auto;
			width: 480px;
			height: 600px;
		}
		.logo{
			width: 152px;
			height: 92px;
			background-image: url(pokemon_go_logo.png);
			background-size: cover;
			margin-left: 170px;
		}
		.image{
			background-image: url();
			background-size: cover;
			width: 300px;
			height: 300px;
			margin-left: 100px;
			margin-top: 30px;
		}
		.imagecontain{
			color: yellow;
			font-size: 50px;
			margin-top: -500px;
			margin-left: 30px;
			text-align: center;
		}
		.bt{
			position: relative;
			display: inline-flex;
			margin-left: 135px;
			margin-top: 50px;
			width: auto;
			height: auto;
		}
		.ball{
			background-image: url(Ball_Poke.png);
			background-size: cover;
			width: 112px;
			height: 112px;
			cursor: pointer;
		}
		.card{
			background-image: url(Poker.png);
			background-size: cover;
			width: 112px;
			height: 112px;
			cursor: pointer;
		}
		.cardcontain{
			color: red;
			font-size: 30px;
			margin-top: -300px;
			margin-left: 30px;
			text-align: center;
		}
	</style>
    <script src="../jquery-3.1.0.min.js"></script>
    <script src="control.js"></script>
</head>
<body>
<div class="contain">
	<div class="logo"></div>
	<div class="image"></div>
	<div class="bt">
		<div class="ball"></div>
		<div class="card"></div>
	</div>
</div>
</body>
</html>
