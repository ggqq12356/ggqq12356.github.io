<!DOCTYPE html>
<html>
<head>
	<title>PokemonGo</title>
	<meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="shortcut icon" href="../game.ico"/>
	<link rel="bookmark" href="../game.ico"/>
	<style type="text/css">
		*{
			font-family: Microsoft JhengHei; /* 微軟正黑體 */
			/*font-family: DFKai-sb; /* 標楷體字型 */
            font-weight: bold; /* 字體粗細 */
		}
		.contain{
			background-image: url(pokemon_bg.png);
			background-size: auto;
			width: 480px;
			height: 600px;
		}
		.logo{
			width: 152px;
			height: 92px;
			background-image: url(pokemon_go_logo.png);
			background-size: cover;
			margin-left: 170px;
			cursor: pointer;
		}
		.img, .img0, .img1, .img2, .img3, .img4, .img5, .img6, .img7, .img8, .img9{
			background-image: url();
			background-size: cover;
			width: 300px;
			height: 300px;
			margin-left: 100px;
			margin-top: 30px;
		}
		.imagecontain{
			color: yellow;
			font-size: 50px;
			margin-top: -500px;
			margin-left: 30px;
			text-align: center;
		}
		.bt{
			position: relative;
			display: inline-flex;
			margin-left: 135px;
			margin-top: 50px;
			width: auto;
			height: auto;
		}
		.ball{
			background-image: url(Ball_Poke.png);
			background-size: cover;
			width: 112px;
			height: 112px;
			cursor: pointer;
		}
		.card{
			background-image: url(Poker.png);
			background-size: cover;
			width: 112px;
			height: 112px;
			cursor: pointer;
		}
		.cardcontain{
			color: yellow;
			font-size: 50px;
			text-align: center;
			border: 3px solid white;
			border-radius: 10px;
			margin-top: -380px;
			margin-left: 30px;
			margin-right: 30px;
			padding-top: 30px;
			padding-bottom: 30px;
			padding-left: 0px;
		}
	</style>
    <script src="../jquery-3.1.0.min.js"></script>
    <script src="control.js"></script>
</head>
<body>
<div class="contain">
	<a href="../" target="_top">
		<div class="logo"></div>
	</a>
	<div class="img"></div>
	<div class="bt">
		<div class="ball"></div>
		<div class="card"></div>
	</div>
</div>
</body>
</html>
